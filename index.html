  mode: "mock",
  zoneForDate(date){
    const n = TERROR_ZONES.length;
    const h = Math.floor(date.getTime()/3600000);
    return TERROR_ZONES[((h%n)+n)%n];
  },
};

/* ---------- 유틸 ---------- */
const pad = n => String(n).padStart(2,"0");

/* ---------- 사운드 ---------- */
let audioCtx=null, soundOn=false;
function ensureAudio(){
  if(!audioCtx){const AC=window.AudioContext||window.webkitAudioContext; if(AC) audioCtx=new AC();}
  if(audioCtx&&audioCtx.state==="suspended") audioCtx.resume();
  return audioCtx;
}
function beep(freq=660,dur=.18,type="sine",gain=.25){
  if(!soundOn) return; const ctx=ensureAudio(); if(!ctx) return;
  const o=ctx.createOscillator(), g=ctx.createGain();
  o.type=type; o.frequency.value=freq;
  g.gain.setValueAtTime(.0001,ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(gain,ctx.currentTime+.02);
  g.gain.exponentialRampToValueAtTime(.0001,ctx.currentTime+dur);
  o.connect(g); g.connect(ctx.destination); o.start(); o.stop(ctx.currentTime+dur+.02);
}
function chime(freqs){ freqs.forEach((f,i)=>setTimeout(()=>beep(f,.24,"triangle",.28), i*160)); }
function speak(text){
  if(!soundOn||!window.speechSynthesis) return;
  const u=new SpeechSynthesisUtterance(text);
  u.lang="ko-KR"; u.rate=1; u.pitch=1; u.volume=1;
  const kr=window.speechSynthesis.getVoices().find(v=>v.lang&&v.lang.startsWith("ko"));
  if(kr) u.voice=kr;
  window.speechSynthesis.cancel(); window.speechSynthesis.speak(u);
}

  {at:600,label:"10분 전"},{at:300,label:"5분 전"},{at:60,label:"1분 전"},
];

function showBanner(msg){
  const b=el("banner");
  b.innerHTML = `<div class="banner">📢 ${esc(msg)}</div>`;
  clearTimeout(bannerTimer);
  bannerTimer=setTimeout(()=>{b.innerHTML="";}, 9000);
}

function renderZone(zone, prefix){
  el(prefix+"Badge").innerHTML = `<span class="badge ${actClass(zone.act)}">${actLabel(zone.act)}</span>`;
  el(prefix+"Kr").textContent = zone.kr;
  el(prefix+"En").textContent = zone.en;
  el(prefix+"Areas").innerHTML = chipsHTML(zone.areas);
}

function renderUpcoming(now){
  let html="";
  for(let i=2;i<=9;i++){
    const d=new Date(now.getTime()+i*3600000);
    const z=dataProvider.zoneForDate(d);
    html += `<div class="up"><div class="hr">${pad(d.getHours())}:00</div>`+
            `<span class="badge ${actClass(z.act)}">${actLabel(z.act)}</span>`+
            `<div class="nm">${esc(z.kr)}</div></div>`;
  }
  el("upcoming").innerHTML=html;
}

function tick(){
  const now=new Date();
  el("clock").textContent = `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;

  const cur = dataProvider.zoneForDate(now);
  const nxt = dataProvider.zoneForDate(new Date(now.getTime()+3600000));

  const secElapsed = now.getMinutes()*60 + now.getSeconds();
  const secLeft = 3600 - secElapsed;
  const progress = secLeft/3600;           // 남은 비율
  const mm=Math.floor(secLeft/60), ss=secLeft%60;

  // 카운트다운
  el("mmss").textContent = `${pad(mm)}:${pad(ss)}`;
  el("ringFg").setAttribute("stroke-dashoffset", (RING_C*(1-progress)).toFixed(2));
  el("pbFill").style.width = ((1-progress)*100).toFixed(2)+"%";
  el("pbHour").textContent = `${pad(now.getHours())}:00`;
  el("pbNext").textContent = `${pad((now.getHours()+1)%24)}:00`;

  const hourKey = `${now.getFullYear()}-${now.getMonth()}-${now.getDate()}-${now.getHours()}`;
  if(!fired[hourKey]) fired[hourKey]=new Set();

  // 시(hour) 변경 → 존/다음/로테이션 갱신 + 정각 알림
  if(hourKey !== lastHourKey){
    renderZone(cur,"cur");
    renderZone(nxt,"nxt");
    renderUpcoming(now);
    if(lastHourKey!==null){
      showBanner(`공포의 영역이 「${cur.kr}」(으)로 변경되었습니다!`);
      chime([523,659,784,1046]);
      speak(`공포의 영역이 변경되었습니다. 현재 지역은 ${cur.kr} 입니다.`);
    }
    lastHourKey=hourKey;
  }

  // 10/5/1분 전 알림
  for(const m of ALERT_MARKS){
    if(secLeft<=m.at && secLeft>m.at-2 && !fired[hourKey].has(m.at)){
      fired[hourKey].add(m.at);
      showBanner(`${m.label} — 다음: ${nxt.kr}`);
      beep(880,.16,"sine",.28); setTimeout(()=>beep(660,.16,"sine",.24),180);
      speak(`공포의 영역 변경 ${m.label}. 다음 지역은 ${nxt.kr} 입니다.`);
    }
  }
}

/* ---------- 사운드 토글 ---------- */
el("soundBtn").addEventListener("click",()=>{
  const btn=el("soundBtn");
  if(!soundOn){
    soundOn=true; ensureAudio();
    if(window.speechSynthesis) window.speechSynthesis.getVoices();
    setTimeout(()=>beep(784,.14,"triangle",.22),50);
    btn.className="btn btn-on"; btn.textContent="🔊 소리 켜짐";
  }else{
    soundOn=false;
    if(window.speechSynthesis) window.speechSynthesis.cancel();
    btn.className="btn btn-off"; btn.textContent="🔈 소리 켜기";
  }
});

/* ---------- 시작 ---------- */
tick();
setInterval(tick,1000);
</script>
</body>
</html>
